name: SendGrid CI

on:
  pull_request:
    branches:
      - next
  push:
    branches:
      - next

jobs:
  sendgrid-e2e:
    name: SendGrid E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 55432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 56379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:55432/postgres
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:55432/postgres
      REDIS_URL: redis://127.0.0.1:56379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: yarn workspace @plunk/db db:generate

      - name: Build shared packages
        run: yarn build --filter="@plunk/db" --filter="@plunk/types" --filter="@plunk/shared"

      - name: Run database migrations
        run: yarn workspace @plunk/db migrate:prod

      - name: Run SendGrid E2E tests
        run: yarn test:sendgrid
